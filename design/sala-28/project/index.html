<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="grain"></div>

<header class="site-header">
  <div class="mark">Sala 28</div>
  <nav>
    <a href="#manifiesto">Manifiesto</a>
    <a href="#eventos">Eventos</a>
    <a href="#mentores">Mentores</a>
    <a href="#solicitar">Solicitar</a>
  </nav>
</header>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/SalaTweaks.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Sections1.jsx"></script>
<script type="text/babel" src="components/Sections2.jsx"></script>
<script type="text/babel" src="components/FormAndFooter.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

function App() {
  // Reveal on scroll
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <window.SalaTweaks />
      <window.Hero />
      <main style={{ position: "relative", zIndex: 2 }}>
        <window.Manifesto />
        <window.Differentiator />
        <window.UpcomingEvents />
        <window.Archive />
        <window.HowItWorks />
        <window.Testimonials />
        <window.Mentors />
        <window.ApplicationForm />
        <window.FAQ />
      </main>
      <window.Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
